services:
  payment-postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment123
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    volumes:
      - payment-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  payment-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: payment-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: payment
      RABBITMQ_DEFAULT_PASS: payment123
    volumes:
      - payment-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-api:
    build: .
    container_name: payment-api
    command: sh -c "npx prisma migrate deploy && node src/index.js"
    dns:                                                                                                                                           
      - 8.8.8.8                                                                                                                                  
      - 8.8.4.4   
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Infrastructure — container networking overrides
      DATABASE_URL: postgresql://payment:payment123@payment-postgres:5432/payment_db
      RABBITMQ_URL: amqp://payment:payment123@payment-rabbitmq:5672
    depends_on:
      payment-postgres:
        condition: service_healthy
      payment-rabbitmq:
        condition: service_healthy

  payment-worker:
    build: .
    container_name: payment-worker
    command: node src/worker/index.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://payment:payment123@payment-postgres:5432/payment_db
      RABBITMQ_URL: amqp://payment:payment123@payment-rabbitmq:5672
    depends_on:
      payment-api:
        condition: service_started

  payment-simulator:
    build:
      context: .
      dockerfile: simulators/order-simulator/Dockerfile
    container_name: payment-simulator
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      PAYMENT_API_URL: http://payment-api:3000
      RABBITMQ_URL: amqp://payment:payment123@payment-rabbitmq:5672
    depends_on:
      payment-api:
        condition: service_started
      payment-rabbitmq:
        condition: service_healthy

volumes:
  payment-pgdata:
  payment-rabbitmq-data:
